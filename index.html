      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: url('https://images.pexels.com/photos/1367192/pexels-photo-1367192.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1');
        background-position: center center;

      .container {
        display: flex;

        height: 100%;

      .title {
        font-size: 60px;
        font-weight: 100;
        margin-bottom: 50px;

        animation: colorChange 10s infinite;
        color: white;

      .title .classAT {
        font-size: 30px;

      .subtitle {

        font-weight: 300;
        color: #fff;
        margin: 0 0 15px;
        text-align: center;
        text-shadow: 0 0 10px #000000;

      .icon {
        width: 100px;
        border-radius: 50%;
        border: 3px solid #fff;
        margin-bottom: 80px;
        box-sizing: border-box;
        filter: blur(0px);
      }

      .link {
        margin-top: 30px;
        color: skyblue;
        text-decoration: none;
        font-weight: bold;
        text-shadow: 0 0 10px #000000;
      }

      .glass {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(20px);
        z-index: -1;
      }

      .footer {
        font-size: 16px;
        font-weight: 300;
        color: #fff;
        margin: 40px 0;
        text-align: center;
        text-shadow: 0 0 10px #000000;
      }

      @keyframes colorChange {
        0% {
          color: #fff;
        }
        25% {
          color: yellow;
        }
        50% {
          color: green;
        }
        75% {
          color: blue;
        }
        100% {
          color: #fff;
        }
      }
